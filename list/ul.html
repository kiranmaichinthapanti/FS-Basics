<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- Internal Stylesheet - writing css under style of head tag -->
        <style>
            ul, ol{
                list-style-type: none;
            }
        </style>
        <!-- External Stylesheet - writing css in a separate file -->
    </head>
    <body>
        <ul>
            <li>Tshirts <small>(240737)</small></li>
            <li>Lounge Tshirts <small>(240737)</small></li>
        </ul>

        <ol type="I">
            <li>Dresses Under ₹599</li>
            <li>Kurtis, Tunics & Tops</li>
            <li>Casual Shirts</li>
        </ol>
        
    </body>
</html>
