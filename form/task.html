<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="task.css">
    </head>
    <body>

        <div id="container">
            <div id="get-skilled">
                <div id="header">
                    <h2>Get Skilled</h2>
                    <h2>X</h2>
                </div>
                <form id="get-skilled-form">
                    <div id="name-field">
                        <label>Name<span>*</span></label>
                        <input type="text" name="name">
                    </div>
                    <div id="phone-field">
                        <label>Phone<span>*</span></label>
                        <div>
                            <input type="text" value="91" name="CountryCode" id="country-code">
                            <input type="text" name="phoneNo" id="phone-no">
                        </div>
                    </div>
                    <div id="email-field">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>
                    <button>Submit</button>
                </form>
            </div>
        </div>
        
    </body>
</html>
